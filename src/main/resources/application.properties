spring.application.name=playlist-generator

# Database - use env vars
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/playlist_generator}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# App credentials
app.spotify.client-id=${SPOTIFY_CLIENT_ID}
app.spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
app.spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/api/auth/callback}
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=${GEMINI_MODEL:gemma-3-27b-it}

# Security
# SameSite=Lax (not Strict) is required for OAuth redirect flows.
# Strict prevents the JSESSIONID cookie from being sent when Spotify redirects
# back to /api/auth/callback (cross-site top-level navigation), which silently
# breaks CSRF state validation and causes 403s on re-login with show_dialog=false.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Problem details
spring.mvc.problemdetails.enabled=true

# Logging
logging.level.com.example.playlistgenerator=INFO
